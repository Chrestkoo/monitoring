    chat_id: -1003851005596
    api_url: "https://api.telegram.org"
    send_resolved: true
    parse_mode: ""
    message: |
      🧠 GPU ALERT

      Alert: {{ .CommonLabels.alertname }}
      Category: {{ .CommonLabels.category }}
      Instance: {{ .CommonLabels.instance }}
