      {{- range .Alerts }}
      ------------------------
      {{- if .Labels.name }}
      Container: {{ .Labels.name }}
      {{- end }}
      {{- if .Labels.id }}
      Container ID: {{ .Labels.id }}
      {{- end }}
      {{- if .Labels.image }}
      Image: {{ .Labels.image }}
      {{- end }}
      Started: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
      {{- end }}

