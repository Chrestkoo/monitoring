global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: node
    static_configs:
      - targets: ['127.0.0.1:9100']

  - job_name: process
    static_configs:
      - targets: ['127.0.0.1:9256']

  - job_name: podman
    static_configs:
      - targets: ['127.0.0.1:9882']

  - job_name: prometheus
    static_configs:
      - targets: ['127.0.0.1:9090']

  - job_name: gpu
    static_configs:
      - targets: ['127.0.0.1:9400']

rule_files:
  - alerts_ai_server.yml

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - 127.0.0.1:9093
